        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        // ตั้งค่าหลักของ GA4
        gtag('config', 'G-01XMBMPS1N');

        // --- ส่วนที่เพิ่มเข้าไปใหม่เพื่อดักจับ QR Code และ Hash #Register ---
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const utmSource = urlParams.get('utm_source');
            const currentHash = window.location.hash;

            // 1. ตรวจจับคนสแกนจาก QR Code (ดูจาก UTM ที่เราตั้งไว้ในลิงก์)
            if (utmSource === 'qrcode') {
            gtag('event', 'qr_scan_entry', {
                'event_category': 'Engagement',
                'event_label': 'Poster QR Code'
            });
            }

            // 2. ถ้าคนเข้ามาแล้วมี #Register อยู่ใน URL ให้ส่งข้อมูลหน้าเว็บแยกออกมา
            if (currentHash === '#Register') {
            gtag('event', 'page_view', {
                'page_title': 'Registration Section',
                'page_path': '/register-section',
                'page_location': window.location.href
            });
            }
        });

        // 3. กรณีคนกดปุ่มบนหน้าเว็บแล้วเลื่อนไปที่ #Register (โดยไม่รีโหลดหน้า)
        window.addEventListener('hashchange', function() {
            if (window.location.hash === '#Register') {
            gtag('event', 'page_view', {
                'page_title': 'Registration Section',
                'page_path': '/register-section'
            });
            }
        });
        </script>
